<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>NOStress Workspace</title>
</head>
<body>
    <div id="loadingScreen">
        <div class="loader-content">
            <div class="loader-brand">
                <div class="app-logo"><span>NS</span></div>
                <h1>NOStress</h1>
            </div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
    </div>

    <div class="background-glow"></div>
    
    <div class="dashboard-container">
        <header class="main-header">
            <div class="brand">
                <div class="app-logo tiny"><span>NS</span></div>
                <h2>NOStress</h2>
            </div>
            <div class="header-actions">
                <select id="langSelect" class="lang-dropdown">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Português</option>
                    <option value="ru">Русский</option>
                    <option value="zh">中文</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>

                <button id="downloadBackupBtn" class="icon-action-btn" title="Export Backup">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>

                <span id="noteCount" class="badge">0 Notes</span>
                
                <button id="openComposeBtn" class="fab-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <span id="lblNewNote">New Note</span>
                </button>
            </div>
        </header>

        <main class="main-display">
            <div id="notesGrid" class="notes-grid"></div>
        </main>
    </div>

    <div id="composeScreen" class="fullscreen-overlay">
        <div class="glass-panel compose-box">
            <div class="compose-header">
                <h3 id="lblDraftTitle" data-edit-mode="false">Draft Note</h3>
                <button id="closeComposeBtn" class="close-icon-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="form-group" id="formGroup">
                <div id="smoothCaret"></div>
                <div id="titleInput" contenteditable="true" spellcheck="false" placeholder="Give it a title..."></div>
                <div id="noteInput" contenteditable="true" spellcheck="false" placeholder="Draft your thoughts here..."></div>
            </div>

            <button id="saveBtn">
                <span id="lblSaveBtn">Save to Board</span>
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box">
            <h4 id="lblConfirmTitle">Delete Note?</h4>
            <p id="lblConfirmDesc">This action is permanent and cannot be undone. Are you sure?</p>
            <div class="modal-buttons">
                <button id="cancelDeleteBtn" class="modal-btn secondary">Keep Note</button>
                <button id="confirmDeleteBtn" class="modal-btn danger">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
